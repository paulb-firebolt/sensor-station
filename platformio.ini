; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
; platform = espressif32
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    knolleary/PubSubClient @ ^2.8.0
    arduino-libraries/Ethernet @ ^2.0.0

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DENABLE_ETHERNET=1
    ; CC1312R sub-1GHz RF coordinator — set to 1 when LaunchPad XL is wired
    ; Wiring: Hat2-Bus G22←CC1312 TX, G23→CC1312 RX, 3V3, GND
    -DENABLE_CC1312=0

; Exclude samples directory from build
build_src_filter = +<*> -<samples/>

monitor_speed = 115200
upload_speed = 921600

; ==============================================================================
; RMII Ethernet TLS test — standalone sketch, no main project dependencies
; Edit src/samples/rmii_tls_test.cpp to set broker/certs before flashing.
; ==============================================================================
[env:m5tab5-tls-test]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = m5stack-tab5-p4
framework = arduino

build_flags =
    -DCONFIG_IDF_TARGET_ESP32P4=1
    -DARDUINO_M5TAB5=1
    -DUSE_RMII_ETHERNET=1
    -DENABLE_ETHERNET=1
    -DWIFI_DISABLED=1

build_src_filter = +<samples/rmii_tls_test.cpp>

monitor_speed = 115200
upload_speed = 921600

; ==============================================================================
; M5Stack Unit PoE P4 (ESP32-P4) environment
; ==============================================================================
; The Unit PoE P4 has a built-in RMII Ethernet MAC (EMAC) connected to an IP101 PHY.
; There is NO WiFi hardware on this board — no ESP32-C6, no radio, no antenna.
; WiFi is permanently disabled via WIFI_DISABLED=1.
; ==============================================================================
[env:m5tab5-esp32p4]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = m5stack-tab5-p4
framework = arduino
board_build.partitions = default_16MB.csv

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    knolleary/PubSubClient @ ^2.8.0
    ; M5Unified-ESP32P4 — add back when using M5.Display/M5.Btn/etc.
    ; Requires Python <= 3.13 due to M5GFX build scripts.
    ; file:///home/paulb/M5unified-ESP32P4

build_flags =
    -DCONFIG_IDF_TARGET_ESP32P4=1
    -DM5UNIFIED_ESP32P4_ONLY=1
    -DARDUINO_M5TAB5=1
    ; RMII Ethernet via built-in EMAC + IP101 PHY (all pins pre-defined in ETH.h)
    -DENABLE_ETHERNET=1
    -DUSE_RMII_ETHERNET=1
    ; Thermal detector — enable once M-Bus SPI wiring is confirmed
    ; Suggested pins: -DPIN_MOSI=20 -DPIN_MISO=19 -DPIN_SCLK=18 -DPIN_CS=21
    -DENABLE_THERMAL_DETECTOR=0
    ; LD2450 mmWave radar — set to 1 when sensor is wired via Hat2-Bus
    ; Wiring: Hat2-Bus 5V→VCC, GND→GND, G19←LD2450 TX, G20→LD2450 RX
    -DENABLE_LD2450=0
    ; CC1312R sub-1GHz RF coordinator — set to 1 when LaunchPad XL is wired
    ; Wiring: Hat2-Bus G22←CC1312 TX, G23→CC1312 RX, 3V3, GND
    -DENABLE_CC1312=1
    ; No WiFi hardware on this board
    -DWIFI_DISABLED=1

; Exclude samples directory from build
build_src_filter = +<*> -<samples/>

monitor_speed = 115200
upload_speed = 921600
