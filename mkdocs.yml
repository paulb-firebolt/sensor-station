site_name: Sensor Station - People Counter
site_description: Firmware documentation for an Ethernet-first people counting sensor platform with MQTT reporting
site_url: https://paulb-firebolt.github.io/sensor-station/
repo_url: https://github.com/paulb-firebolt/sensor-station
repo_name: paulb-firebolt/sensor-station
copyright: Copyright &copy; 2026 Glimpse Analytics
docs_dir: docs

theme:
  name: material
  logo: null
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences

plugins:
  - search
  - awesome-nav

extra:
  generator: false
